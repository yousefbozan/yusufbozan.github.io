<section id="contact-container" class="min-h-screen py-20 px-4 sm:px-6 lg:px-8">
    <div class="max-w-6xl mx-auto">
        <div class="motion-fadeIn text-center mb-16">
            <div class="status-indicator mb-4 mx-auto flex items-center justify-center gap-2 bg-green-500/10 text-green-400 px-4 py-2 rounded-full w-fit border border-green-500/20 text-sm">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                Şu an yeni projelere açık
            </div>
            <h1 class="text-4xl sm:text-5xl font-bold mb-4 gradient-text">İletişim</h1>
            <p class="text-xl text-gray-400 max-w-2xl mx-auto">
                Bir projeniz mi var? İş birliği yapmak mı istiyorsunuz? Benimle iletişime geçmekten çekinmeyin!
            </p>
        </div>

        <div class="contact-cards-grid motion-fadeIn delay-1 mb-12 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card contact-info-card text-center p-8 rounded-2xl border border-white/5 bg-white/5 group hover:border-blue-500/30 transition-all">
                <i data-lucide="mail" class="mx-auto text-blue-500 mb-4 group-hover:scale-110 transition-transform"></i>
                <h3 class="text-lg font-semibold text-white mb-2">E-posta</h3>
                <p class="text-gray-300">ybozan183@gmail.com</p>
            </div>
            </div>

        <div class="grid lg:grid-cols-5 gap-8 mt-12">
            <div class="motion-slideInLeft lg:col-span-2 space-y-8 delay-1">
                </div>

            <div class="motion-slideInRight lg:col-span-3 delay-2 relative">
                <form id="contactForm" class="glass-card p-8 rounded-2xl border border-white/10 bg-white/5 h-full relative overflow-hidden">
                    
                    <div id="successOverlay" class="absolute inset-0 bg-slate-900/95 backdrop-blur-md flex flex-col items-center justify-center text-center p-6 transition-all duration-500 opacity-0 pointer-events-none z-50">
                        <div class="mb-4 bg-green-500/20 p-4 rounded-full">
                            <i data-lucide="check-circle" class="text-green-400" size="48"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-2">Mesaj Gönderildi!</h3>
                        <p class="text-gray-400 mb-6">En kısa sürede sana geri döneceğim bro.</p>
                        <button type="button" onclick="resetForm()" class="px-6 py-2 bg-white/10 hover:bg-white/20 text-white rounded-lg transition-all border border-white/5">
                            Yeni Mesaj Gönder
                        </button>
                    </div>

                    <h2 class="text-2xl font-semibold mb-2 text-white">Mesaj Gönderin</h2>
                    <p class="text-gray-400 text-sm mb-8">En kısa sürede geri dönüş yapacağım.</p>
                    
                    <div class="space-y-6">
                        <div class="custom-input-group">
                            <label class="block text-sm font-medium mb-2 text-gray-300">İsim Soyisim *</label>
                            <input type="text" id="name" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none focus:border-blue-500 transition-all" placeholder="Adınız Soyadınız">
                        </div>
                        <div class="custom-input-group">
                            <label class="block text-sm font-medium mb-2 text-gray-300">Email Adresi *</label>
                            <input type="email" id="email" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none focus:border-blue-500 transition-all" placeholder="ornek@email.com">
                        </div>
                        <div class="custom-input-group">
                            <label class="block text-sm font-medium mb-2 text-gray-300">Mesajınız *</label>
                            <textarea id="message" required rows="4" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none focus:border-blue-500 transition-all resize-none" placeholder="Projeniz hakkında bilgi verin..."></textarea>
                        </div>
                        
                        <button type="submit" id="submitButton" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20">
                            <i data-lucide="send" size="18"></i> <span>Mesajı Gönder</span>
                        </button>
                    </div>
                </form>
